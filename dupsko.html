<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEIL SLASH</title>
    <style>
        body{
            margin: 0;
            height: 100vh;
            background-color: #FF00FF;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }
        h1{
            font-weight: bold;
            font-size: clamp(30px, 8vw, 60px);
            margin: 50px;
            animation: 
                blink 0.6s infinite,
                pulseText 1s infinite alternate;
        }
        img{
            width: 80vw;
            max-width: 300px;
            margin: 10px;
            animation: 
                spin 3s linear infinite,
                pulseImg 1s infinite alternate;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        @keyframes pulseText {
            from {
                transform: scale(1);
                color: white;
            }
            to {
                transform: scale(1.2);
                color: yellow;
            }
        }
        @keyframes pulseImg {
            from {
                transform: scale(1);
            }
            to {
                transform: scale(1.3);
            }
        }

    </style>
</head>

<body>
    <h1>HUJ CI W DUPE SZMATO</h1>
    <img src="img.jpg" alt="HUJ">
</body>
</html>
