<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEIL SLASH</title>
    <style>
        body{
            margin: 0;
            height: 100vh;
            background-color: #FF00FF;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }
        h1{
            font-weight: bold;
            font-size: clamp(30px, 8vw, 60px);
            margin: 50px;
            animation: 
                pulseText 1s infinite alternate;
        }
        img{
            border: yellow double 10px;
            max-width: 250px;
            margin: 10px;
        }
        @keyframes pulseText {
            from {
                transform: scale(1);
                color: white;
            }
            to {
                transform: scale(1.2);
                color: yellow;
            }
        }
        div{
            display: flex;
            flex: wrap;
        }
    </style>
</head>
<body>
    <h1>GALERIA SZTUKI</h1>
    <div>
        <img src="zdj1.jpg" alt="HUJ">
        <img src="zdj2.jpg" alt="HUJ">
    </div>
</body>
</html>
