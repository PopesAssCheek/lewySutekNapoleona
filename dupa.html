<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEIL SLASH</title>
    <link rel="stylesheet" href="kupsko.css">
</head>
<body>
    <center>
        <header id="countdown">
            <script>
                const targetDate = new Date("2026-03-29T18:40:00+02:00").getTime();
                const countdown = setInterval(()=>{
                    const now = new Date().getTime();
                    const distance = now - targetDate;
                    if(distance< 0){
                        clearInterval(countdown);
                        document.getElementById("countdown").innerHTML = "Czary mary okulary twoja stara to twoj stary";
                        return;
                    }
                    const days = Math.floor(distance / (1000*60*60*24));
                    const hours = Math.floor((distance / (1000*60*60))%24);
                    const minutes = Math.floor((distance / (1000*60))%60);
                    const seconds = Math.floor((distance / 1000)%60);
                    document.getElementById("countdown").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s";
                }, 1000);
            </script>
        </header>
    </center>

</body>
